---
# Docker daemon configuration tasks

- name: Verify Docker daemon config file exists
  ansible.builtin.stat:
    path: files/docker_daemon.json
  delegate_to: localhost
  register: daemon_config_file
  tags:
    - docker
    - docker-config
    - validation

- name: Fail if Docker daemon config file is missing
  ansible.builtin.fail:
    msg: "Docker daemon configuration file (files/docker_daemon.json) not found"
  when: not daemon_config_file.stat.exists
  tags:
    - docker
    - docker-config
    - validation

- name: Create /etc/docker directory if it doesn't exist
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags:
    - docker
    - docker-config

- name: Copy daemon.json to /etc/docker/
  ansible.builtin.copy:
    src: files/docker_daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
    validate: python3 -m json.tool %s
  notify:
    - Restart docker
  tags:
    - docker
    - docker-config
    - config

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  register: docker_service
  retries: 3
  delay: 5
  until: docker_service is succeeded
  tags:
    - docker
    - docker-service
    - service

- name: Wait for Docker service to be active
  ansible.builtin.service_facts:
  tags:
    - docker
    - docker-service
    - validation

- name: Verify Docker service is active
  ansible.builtin.assert:
    that:
      - "ansible_facts.services['docker.service'].state == 'running'"
    fail_msg: "Docker service is not running"
    success_msg: "Docker service is active"
  tags:
    - docker
    - docker-service
    - validation

- name: Verify Docker is functional
  ansible.builtin.command: docker ps
  register: docker_ps_result
  changed_when: false
  failed_when: docker_ps_result.rc != 0
  tags:
    - docker
    - docker-service
    - validation
